<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nopeus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1c1c1f;
    --border: rgba(255,255,255,0.07);
    --border-subtle: rgba(255,255,255,0.04);
    --text-primary: #f0ede8;
    --text-secondary: #5a5a60;
    --text-tertiary: #35353a;
    --accent: #f0ede8;
    --radius: 18px;
    --radius-sm: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px 20px 32px;
    gap: 10px;
  }

  /* ── Start screen ── */
  #startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .start-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  #startBtn {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  #startBtn:active { transform: scale(0.91); background: var(--surface2); }

  /* ── App ── */
  #app {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 380px;
    gap: 10px;
  }

  #app.visible { display: flex; }

  /* ── Speed card ── */
  .speed-wrap {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 44px 28px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* subtle top shimmer line */
  .speed-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  }

  .speed-num {
    font-family: 'DM Mono', monospace;
    font-size: 100px;
    font-weight: 300;
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: -5px;
    transition: opacity 0.15s;
  }

  .speed-unit-label {
    margin-top: 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 18px 18px;
    position: relative;
    overflow: hidden;
  }

  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 18%; right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }

  .stat-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -1px;
    line-height: 1;
  }

  .stat-sub {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Unit selector ── */
  .unit-row {
    display: flex;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    padding: 4px;
    gap: 3px;
  }

  .unit-btn {
    flex: 1;
    padding: 11px 4px;
    background: transparent;
    border: none;
    border-radius: 9px;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .unit-btn.active {
    background: var(--surface2);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }

  .unit-btn:active { opacity: 0.5; }

  /* ── Bottom row ── */
  .bottom-row {
    display: flex;
    width: 100%;
    gap: 10px;
    align-items: stretch;
  }

  .reset-btn {
    flex: 1;
    padding: 15px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .reset-btn:active { opacity: 0.4; transform: scale(0.97); }

  .gps-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 16px;
    flex-shrink: 0;
  }

  .gps-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    transition: background 0.3s ease;
    flex-shrink: 0;
  }

  .gps-dot.ok { background: #4caf7d; box-shadow: 0 0 6px rgba(76,175,125,0.5); }
  .gps-dot.err { background: #e05a4a; }
  .gps-dot.searching { animation: blink 1.2s infinite; background: var(--text-secondary); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .gps-text {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ── Error ── */
  #errorMsg {
    display: none;
    font-size: 12px;
    line-height: 1.6;
    color: #e05a4a;
    text-align: center;
    padding: 16px 8px 0;
    white-space: pre-line;
  }
</style>
</head>
<body>

<div id="startScreen">
  <span class="start-label">GPS Nopeusmittari</span>
  <button id="startBtn" onclick="startApp()">Aloita</button>
</div>

<div id="app">
  <div class="speed-wrap">
    <div class="speed-num" id="speedNum">0</div>
    <div class="speed-unit-label" id="speedUnitLbl">km/h</div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Keskinopeus</div>
      <div class="stat-val" id="avgVal">0</div>
      <div class="stat-sub" id="avgSub">km/h</div>
    </div>
    <div class="stat">
      <div class="stat-label">Huippunopeus</div>
      <div class="stat-val" id="maxVal">0</div>
      <div class="stat-sub" id="maxSub">km/h</div>
    </div>
  </div>

  <div class="unit-row">
    <button class="unit-btn active" id="u-kmh" onclick="setUnit('kmh')">km/h</button>
    <button class="unit-btn" id="u-mph" onclick="setUnit('mph')">mph</button>
    <button class="unit-btn" id="u-ms" onclick="setUnit('ms')">m/s</button>
    <button class="unit-btn" id="u-kn" onclick="setUnit('kn')">kn</button>
  </div>

  <div class="bottom-row">
    <button class="reset-btn" onclick="resetData()">Nollaa</button>
    <div class="gps-pill">
      <div class="gps-dot searching" id="gpsDot"></div>
      <span class="gps-text" id="gpsText">Haetaan</span>
    </div>
  </div>

  <div id="errorMsg"></div>
</div>

<script>
  let unit = 'kmh';
  let maxMs = 0;
  let samples = [];
  let currentMs = 0;

  const factors = { kmh: 3.6, mph: 2.23694, ms: 1, kn: 1.94384 };
  const dec     = { kmh: 0, mph: 0, ms: 1, kn: 1 };
  const labels  = { kmh: 'km/h', mph: 'mph', ms: 'm/s', kn: 'kn' };

  function conv(ms) { return (ms * factors[unit]).toFixed(dec[unit]); }

  function startApp() {
    if (!navigator.geolocation) { showError('GPS ei ole tuettu tässä selaimessa.'); return; }
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    navigator.geolocation.watchPosition(onPos, onErr, {
      enableHighAccuracy: true, maximumAge: 1000, timeout: 15000
    });
  }

  function onPos(pos) {
    const spd = pos.coords.speed != null ? Math.max(0, pos.coords.speed) : 0;
    currentMs = spd;
    document.getElementById('speedNum').textContent = conv(spd);
    if (spd > 0.3) { samples.push(spd); if (samples.length > 300) samples.shift(); }
    if (spd > maxMs) maxMs = spd;
    updateStats();
    const dot = document.getElementById('gpsDot');
    dot.className = 'gps-dot ok';
    const acc = pos.coords.accuracy;
    document.getElementById('gpsText').textContent = acc ? '±' + Math.round(acc) + ' m' : 'GPS';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function onErr(e) {
    const msgs = {
      1: 'Sijaintilupa evätty.\n\nAsetukset → Safari → Sijainti → Salli',
      2: 'GPS ei saatavilla.\nMene ulos ja yritä uudelleen.',
      3: 'Aikakatkaisu. Yritä uudelleen.'
    };
    showError(msgs[e.code] || 'GPS-virhe.');
    const dot = document.getElementById('gpsDot');
    dot.className = 'gps-dot err';
    document.getElementById('gpsText').textContent = 'Virhe';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
  }

  function updateStats() {
    const avg = samples.length ? samples.reduce((a,b)=>a+b,0)/samples.length : 0;
    document.getElementById('avgVal').textContent = conv(avg);
    document.getElementById('maxVal').textContent = conv(maxMs);
    document.getElementById('avgSub').textContent = labels[unit];
    document.getElementById('maxSub').textContent = labels[unit];
  }

  function setUnit(u) {
    unit = u;
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('u-' + u).classList.add('active');
    document.getElementById('speedUnitLbl').textContent = labels[u];
    document.getElementById('speedNum').textContent = conv(currentMs);
    updateStats();
  }

  function resetData() {
    maxMs = 0; samples = [];
    document.getElementById('avgVal').textContent = '0';
    document.getElementById('maxVal').textContent = '0';
  }
</script>
</body>
</html>
